version: "3.9"

services:

  api:

    build: .

    container_name: order-api

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always

  postgres:

    image: postgres:17

    container_name: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

volumes:

  postgres_data: